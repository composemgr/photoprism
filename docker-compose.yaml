# nginx proxy address - http://172.17.0.1:2342

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - photoprism
    ports:
      - "2342:2342"
    environment:
      TZ: ${TZ:-America/New_York}
      PHOTOPRISM_ADMIN_USER: ${APP_ADMIN_USER:-admin}
      PHOTOPRISM_ADMIN_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
      PHOTOPRISM_AUTH_MODE: password
      PHOTOPRISM_SITE_URL: https://${BASE_DOMAIN_NAME:-${BASE_HOST_NAME:-localhost}}
      PHOTOPRISM_ORIGINALS_LIMIT: 5000
      PHOTOPRISM_HTTP_COMPRESSION: gzip
      PHOTOPRISM_DATABASE_DRIVER: mysql
      PHOTOPRISM_DATABASE_SERVER: photoprism-db:3306
      PHOTOPRISM_DATABASE_NAME: ${DB_CREATE_DATABASE_NAME:-photoprism}
      PHOTOPRISM_DATABASE_USER: ${DB_USER_NAME:-photoprism}
      PHOTOPRISM_DATABASE_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      PHOTOPRISM_DISABLE_CHOWN: "false"
      PHOTOPRISM_DISABLE_WEBDAV: "false"
      PHOTOPRISM_DETECT_NSFW: "false"
      PHOTOPRISM_UPLOAD_NSFW: "true"
      PHOTOPRISM_SMTP_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      PHOTOPRISM_SMTP_PORT: ${EMAIL_SERVER_PORT:-587}
      PHOTOPRISM_SMTP_USERNAME: ${EMAIL_SERVER_LOGIN_NAME:-}
      PHOTOPRISM_SMTP_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
      PHOTOPRISM_SMTP_FROM: photoprism@${BASE_DOMAIN_NAME:-${BASE_HOST_NAME:-localhost}}
    volumes:
      - ./rootfs/data/photoprism/originals:/photoprism/originals
      - ./rootfs/data/photoprism/storage:/photoprism/storage
      - ./rootfs/data/photoprism/import:/photoprism/import
    depends_on:
      - photoprism-db
    healthcheck:
      test: ["CMD", "photoprism", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  photoprism-db:
    image: mariadb:11
    container_name: photoprism-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - photoprism
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-photoprism}
      MARIADB_USER: ${DB_USER_NAME:-photoprism}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_root_password}
    volumes:
      - ./rootfs/db/mariadb/photoprism:/var/lib/mysql
    command: --innodb-buffer-pool-size=512M --transaction-isolation=READ-COMMITTED --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=512 --innodb-rollback-on-timeout=OFF --innodb-lock-wait-timeout=120
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  photoprism:
    external: false
