# nginx proxy address - http://172.17.0.1:2342

name: photoprism
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  photoprism:
    image: photoprism/photoprism:latest
    pull_policy: always
    container_name: photoprism-app
    restart: always
    logging: *default-logging
    networks:
      - photoprism
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:2342:2342"
    environment:
      TZ: ${TZ:-America/New_York}
      PHOTOPRISM_ADMIN_USER: ${APP_ADMIN_USER:-admin}
      PHOTOPRISM_ADMIN_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
      PHOTOPRISM_AUTH_MODE: password
      PHOTOPRISM_SITE_URL: https://${BASE_DOMAIN_NAME:-example.com}
      PHOTOPRISM_ORIGINALS_LIMIT: 5000
      PHOTOPRISM_HTTP_COMPRESSION: gzip
      PHOTOPRISM_DATABASE_DRIVER: mysql
      PHOTOPRISM_DATABASE_SERVER: photoprism-db:3306
      PHOTOPRISM_DATABASE_NAME: ${DB_CREATE_DATABASE_NAME:-photoprism}
      PHOTOPRISM_DATABASE_USER: ${DB_USER_NAME:-photoprism}
      PHOTOPRISM_DATABASE_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      PHOTOPRISM_DISABLE_CHOWN: "false"
      PHOTOPRISM_DISABLE_WEBDAV: "false"
      PHOTOPRISM_DETECT_NSFW: "false"
      PHOTOPRISM_UPLOAD_NSFW: "true"
      PHOTOPRISM_SMTP_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      PHOTOPRISM_SMTP_PORT: ${EMAIL_SERVER_PORT:-587}
      PHOTOPRISM_SMTP_USERNAME: ${EMAIL_SERVER_LOGIN_NAME:-}
      PHOTOPRISM_SMTP_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
      PHOTOPRISM_SMTP_FROM: ${EMAIL_SERVER_MAIL_FROM:-photoprism@example.com}
      CONTAINER_NAME: photoprism-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/photoprism/originals:/photoprism/originals
      - ./volumes/data/photoprism/storage:/photoprism/storage
      - ./volumes/data/photoprism/import:/photoprism/import
    depends_on:
      - photoprism-db
    healthcheck:
      test: ["CMD", "photoprism", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://photoprism-app:2342'
      - 'cloudflare.hostname=photoprism.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.photoprism-app.entrypoints=http'
      - 'traefik.http.routers.photoprism-app-secure.tls=true'
      - 'traefik.http.routers.photoprism-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.photoprism-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.photoprism-app.middlewares=photoprism-app-https-redirect'
      - 'traefik.http.routers.photoprism-app-secure.entrypoints=https'
      - 'traefik.http.routers.photoprism-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.photoprism-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.photoprism-app-secure.service=photoprism-app'
      - 'traefik.http.services.photoprism-app.loadbalancer.server.port=2342'

  photoprism-db:
    image: mariadb:latest
    pull_policy: always
    container_name: photoprism-db
    restart: always
    logging: *default-logging
    networks:
      - photoprism
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-photoprism}
      MARIADB_USER: ${DB_USER_NAME:-photoprism}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: photoprism-db
    volumes:
      - ./volumes/data/db/mariadb/photoprism:/var/lib/mysql
    command: --innodb-buffer-pool-size=512M --transaction-isolation=READ-COMMITTED --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=512 --innodb-rollback-on-timeout=OFF --innodb-lock-wait-timeout=120
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  photoprism:
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
